<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALIBI — Easy Mode</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #090909;
      --deep: #0d0c0a;
      --card: #13120f;
      --border: #252218;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #5a4a1e;
      --red: #8b1a1a;
      --red-light: #c0392b;
      --cream: #e2d9c4;
      --muted: #6a6050;
      --green: #4aaa6a;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Crimson Text', Georgia, serif;
      overflow: hidden;
      cursor: crosshair;
    }

    /* ── ATMOSPHERE ── */
    #vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.82) 100%);
    }

    #noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    #rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .drop {
      position: absolute;
      top: -40px;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(180, 170, 140, 0.15));
      animation: fall linear infinite;
      border-radius: 2px;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }

    /* ── LAYOUT ── */
    #shell {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #top-bar {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 32px 22px;
      background: var(--black);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .tb-back {
      position: absolute;
      left: 28px;
      top: 28px;
      font-family: 'Special Elite', monospace;
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }

    .tb-back:hover {
      color: var(--cream);
      border-color: var(--gold-dim);
    }

    .tb-case {
      font-family: 'Special Elite', monospace;
      font-size: .55rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 6px;
    }

    .tb-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 900;
      font-style: italic;
      color: var(--cream);
      margin-bottom: 14px;
    }

    .tb-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin-bottom: 14px;
    }

    .tb-situation-text {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--cream);
      line-height: 1.7;
      max-width: 640px;
      text-align: center;
      opacity: .85;
    }

    .tb-instruction {
      margin-top: 14px;
      font-family: 'Special Elite', monospace;
      font-size: .55rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tb-instruction span {
      color: var(--gold);
    }

    /* ── SUSPECT GRID ── */
    #suspect-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      overflow: hidden;
    }

    .suspect-cell {
      position: relative;
      border: 1px solid var(--border);
      padding: 18px 22px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 16px;
      cursor: pointer;
      transition: all .3s;
      overflow: hidden;
      background: var(--black);
    }

    .cell-canvas-wrap {
      flex-shrink: 0;
      width: 90px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cell-canvas-wrap canvas {
      width: 90px !important;
      height: 120px !important;
      display: block;
    }

    .cell-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .suspect-cell::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: transparent;
      transition: background .3s;
    }

    .suspect-cell:hover::before {
      background: var(--gold);
    }

    .suspect-cell:hover {
      background: #0f0e0c;
    }

    /* shimmer on hover */
    .suspect-cell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .3s;
    }

    .suspect-cell:hover::after {
      opacity: 1;
    }

    /* selected state */
    .suspect-cell.selected {
      background: #12100a;
      border-color: var(--gold-dim);
      box-shadow: inset 0 0 40px rgba(201, 168, 76, 0.06);
    }

    .suspect-cell.selected::before {
      background: var(--gold);
    }

    /* correct / wrong reveal states */
    .suspect-cell.correct {
      background: rgba(74, 170, 106, 0.08);
      border-color: var(--green);
    }

    .suspect-cell.correct::before {
      background: var(--green);
    }

    .suspect-cell.wrong {
      background: rgba(192, 57, 43, 0.08);
      border-color: var(--red-light);
    }

    .suspect-cell.wrong::before {
      background: var(--red-light);
    }

    .cell-top {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cell-num {
      font-family: 'Special Elite', monospace;
      font-size: .55rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    .cell-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
    }

    .cell-role {
      font-family: 'Special Elite', monospace;
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cell-statement {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1rem;
      line-height: 1.65;
      color: var(--cream);
      margin-top: 16px;
      flex: 1;
      border-left: 2px solid var(--border);
      padding-left: 16px;
      transition: border-color .3s;
    }

    .suspect-cell:hover .cell-statement,
    .suspect-cell.selected .cell-statement {
      border-color: var(--gold-dim);
    }

    .cell-select-hint {
      font-family: 'Special Elite', monospace;
      font-size: .55rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 14px;
      opacity: 0;
      transition: opacity .25s;
    }

    .suspect-cell:hover .cell-select-hint {
      opacity: 1;
    }

    .suspect-cell.selected .cell-select-hint {
      opacity: 0;
    }

    /* result badge inside cell */
    .cell-result-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      font-family: 'Special Elite', monospace;
      font-size: .55rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid;
      display: none;
    }

    .suspect-cell.correct .cell-result-badge {
      display: inline-block;
      color: var(--green);
      border-color: var(--green);
      content: 'THE LIE';
    }

    .suspect-cell.wrong .cell-result-badge {
      display: inline-block;
      color: var(--red-light);
      border-color: var(--red-light);
    }

    /* ── BOTTOM SUBMIT BAR ── */
    #submit-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 16px 32px;
      background: linear-gradient(to top, rgba(9, 9, 9, 0.97), transparent);
      border-top: 1px solid var(--border);
    }

    #submit-hint {
      font-family: 'Special Elite', monospace;
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #submit-btn {
      font-family: 'Special Elite', monospace;
      font-size: .75rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--black);
      border: none;
      cursor: pointer;
      padding: 13px 40px;
      transition: all .25s;
      opacity: 0.4;
      pointer-events: none;
    }

    #submit-btn.ready {
      opacity: 1;
      pointer-events: all;
    }

    #submit-btn.ready:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    #submit-btn:active {
      transform: translateY(0);
    }

    /* ── RESULT OVERLAY ── */
    #result-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(9, 9, 9, 0.93);
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn .4s ease;
    }

    #result-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .result-box {
      width: 540px;
      max-width: 94vw;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 44px 48px;
      text-align: center;
      position: relative;
    }

    .result-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .result-box.correct::before {
      background: linear-gradient(to right, transparent, var(--green), transparent);
    }

    .result-box.wrong::before {
      background: linear-gradient(to right, transparent, var(--red-light), transparent);
    }

    .result-icon {
      font-size: 2.4rem;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 18px currentColor);
    }

    .result-box.correct .result-icon {
      color: var(--green);
    }

    .result-box.wrong .result-icon {
      color: var(--red-light);
    }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .result-subtitle {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* reveal the lie */
    .result-lie-label {
      font-family: 'Special Elite', monospace;
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .result-lie-text {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: .95rem;
      color: var(--cream);
      line-height: 1.6;
      background: var(--deep);
      border-left: 3px solid var(--gold);
      padding: 12px 16px;
      margin-bottom: 10px;
      text-align: left;
    }

    .result-lie-explanation {
      font-family: 'Crimson Text', serif;
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.6;
      text-align: left;
      margin-bottom: 28px;
    }

    .result-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .result-btn {
      font-family: 'Special Elite', monospace;
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }

    .result-btn.primary {
      background: var(--gold);
      color: var(--black);
    }

    .result-btn.primary:hover {
      background: var(--gold-light);
    }

    .result-btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .result-btn.ghost:hover {
      color: var(--cream);
      border-color: var(--muted);
    }

    /* ── REASONING MODAL ── */
    #reasoning-modal {
      position: fixed;
      inset: 0;
      z-index: 45;
      background: rgba(9, 9, 9, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn .3s ease;
    }

    #reasoning-modal.show {
      display: flex;
    }

    .reasoning-box {
      width: 580px;
      max-width: 94vw;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 40px 44px;
      position: relative;
    }

    .reasoning-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .reasoning-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--cream);
      margin-bottom: 4px;
    }

    .reasoning-sub {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-size: .95rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .reasoning-suspect {
      font-family: 'Special Elite', monospace;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .reasoning-label {
      font-family: 'Special Elite', monospace;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    #reasoning-input {
      width: 100%;
      min-height: 110px;
      background: var(--deep);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Crimson Text', serif;
      font-size: .95rem;
      padding: 12px 16px;
      outline: none;
      resize: vertical;
      line-height: 1.6;
      transition: border-color .2s;
    }

    #reasoning-input:focus {
      border-color: var(--gold-dim);
    }

    #reasoning-input::placeholder {
      color: var(--muted);
    }

    .reasoning-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      align-items: center;
    }

    .reasoning-back {
      font-family: 'Special Elite', monospace;
      font-size: .62rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px 22px;
      cursor: pointer;
      transition: all .2s;
    }

    .reasoning-back:hover {
      color: var(--cream);
      border-color: var(--muted);
    }

    .reasoning-submit {
      flex: 1;
      font-family: 'Special Elite', monospace;
      font-size: .72rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 13px 28px;
      cursor: pointer;
      transition: all .2s;
    }

    .reasoning-submit:hover {
      background: var(--gold-light);
    }

    .reasoning-submit:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    /* spinner */
    .reasoning-spinner {
      display: none;
      align-items: center;
      gap: 10px;
      font-family: 'Special Elite', monospace;
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 16px;
    }

    .reasoning-spinner.show {
      display: flex;
    }

    .spin-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 2px;
      animation: dot 1.2s ease-in-out infinite;
    }

    .spin-dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .spin-dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes dot {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-6px);
      }
    }

    /* LLM feedback in result */
    .result-llm-feedback {
      font-family: 'Crimson Text', serif;
      font-size: .92rem;
      color: var(--cream);
      line-height: 1.6;
      background: var(--deep);
      border-left: 3px solid var(--gold-dim);
      padding: 12px 16px;
      margin-bottom: 18px;
      text-align: left;
      white-space: pre-wrap;
    }

    .result-llm-label {
      font-family: 'Special Elite', monospace;
      font-size: .58rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div id="rain"></div>
  <div id="vignette"></div>
  <div id="noise"></div>

  <div id="shell">

    <!-- TOP BAR -->
    <div id="top-bar">
      <button class="tb-back" onclick="window.location.href='index.html'">← Back</button>
      <div class="tb-case" id="hud-case">Case · E-001</div>
      <div class="tb-title" id="hud-title">Loading…</div>
      <div class="tb-divider"></div>
      <div class="tb-situation-text" id="hud-situation">—</div>
      <div class="tb-instruction">Read each alibi. <span>One is a lie.</span> Find it.</div>
    </div>

    <!-- SUSPECT GRID (4 cells, built by JS) -->
    <div id="suspect-grid"></div>

    <!-- SUBMIT BAR -->
    <div id="submit-bar">
      <div id="submit-hint">Select the false statement above</div>
      <button id="submit-btn" onclick="submitAnswer()">Submit Verdict →</button>
    </div>

  </div>

  <!-- REASONING MODAL -->
  <div id="reasoning-modal">
    <div class="reasoning-box">
      <div class="reasoning-title">Explain Your Reasoning</div>
      <div class="reasoning-sub">You've identified the liar — now tell us <em>why</em> their alibi is false.</div>
      <div class="reasoning-suspect" id="reasoning-suspect-name">—</div>
      <label class="reasoning-label">Why is this alibi impossible?</label>
      <textarea id="reasoning-input"
        placeholder="Explain the contradiction or logical impossibility in their statement…"></textarea>
      <div class="reasoning-spinner" id="reasoning-spinner">
        <div class="spin-dots"><span></span><span></span><span></span></div>
        Consulting the evidence…
      </div>
      <div class="reasoning-actions">
        <button class="reasoning-back" onclick="closeReasoning()">← Go Back</button>
        <button class="reasoning-submit" id="reasoning-submit-btn" onclick="submitReasoning()">Submit Reasoning
          →</button>
      </div>
    </div>
  </div>

  <!-- RESULT OVERLAY -->
  <div id="result-overlay">
    <div class="result-box" id="result-box">
      <div class="result-icon" id="result-icon">✓</div>
      <div class="result-title" id="result-title">Correct</div>
      <div class="result-subtitle" id="result-subtitle"></div>
      <div class="result-llm-label" id="result-llm-label">The Judge's Assessment</div>
      <div class="result-llm-feedback" id="result-llm-feedback"></div>
      <div class="result-lie-label">The False Statement</div>
      <div class="result-lie-text" id="result-lie-text"></div>
      <div class="result-lie-explanation" id="result-lie-explanation"></div>
      <div class="result-actions">
        <button class="result-btn ghost" onclick="window.location.href='index.html'">← Case Files</button>
        <button class="result-btn primary" onclick="tryAgain()">Try Again</button>
      </div>
    </div>
  </div>

  <script src="stories.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>

    /* ── RAIN ── */
    const rainEl = document.getElementById('rain');
    for (let i = 0; i < 70; i++) {
      const d = document.createElement('div');
      d.className = 'drop';
      const x = Math.random() * 100;
      const h = 40 + Math.random() * 80;
      const dur = 0.7 + Math.random() * 1.1;
      const delay = Math.random() * 3;
      d.style.cssText = `left:${x}%;height:${h}px;animation-duration:${dur}s;animation-delay:-${delay}s;opacity:${0.25 + Math.random() * 0.5}`;
      rainEl.appendChild(d);
    }

    /* ── LOAD STORY ── */
    const params = new URLSearchParams(window.location.search);
    const STORY_ID = params.get('story') || '';

    const STORY = getEasyStory(STORY_ID);

    const charScenes = [];

    if (!STORY) {
      document.getElementById('suspect-grid').innerHTML =
        '<div style="color:var(--gold);font-family:serif;text-align:center;padding:20vh;grid-column:1/-1">Story not found: ' + STORY_ID + '<br><br><a href="index.html" style="color:var(--muted)">← Back to menu</a></div>';
    } else {
      // Populate HUD
      document.getElementById('hud-case').textContent = 'Case · ' + STORY.caseNumber;
      document.getElementById('hud-title').textContent = STORY.title;
      document.getElementById('hud-situation').textContent = STORY.situation;

      // Build suspect grid
      const grid = document.getElementById('suspect-grid');
      STORY.suspects.forEach((s, i) => {
        const cell = document.createElement('div');
        cell.className = 'suspect-cell';
        cell.id = 'cell-' + s.id;
        cell.dataset.id = s.id;
        cell.onclick = () => selectSuspect(s.id);
        cell.innerHTML = `
      <div class="cell-result-badge" id="badge-${s.id}"></div>
      <div class="cell-canvas-wrap" id="canvas-wrap-${s.id}"></div>
      <div class="cell-content">
        <div class="cell-top">
          <div class="cell-num">Suspect · ${String(i + 1).padStart(2, '0')}</div>
          <div class="cell-name">${s.name}</div>
          <div class="cell-role">${s.role}</div>
        </div>
        <div class="cell-statement">${formatDialogue(s.easyStatement)}</div>
        <div class="cell-select-hint">Click to select as the lie →</div>
      </div>`;
        grid.appendChild(cell);
      });

      // ── THREE.JS: build mini character scenes ──

      function makeCharacter(accentHex) {
        const group = new THREE.Group();
        const c = 0x2a251e;
        const ac = parseInt(accentHex.replace('#', ''), 16);

        // Body
        const bodyGeo = new THREE.CylinderGeometry(0.28, 0.32, 1.1, 12);
        const bodyMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, metalness: 0.05 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.55;
        group.add(body);

        // Collar
        const collarGeo = new THREE.CylinderGeometry(0.29, 0.29, 0.06, 12);
        const collarMat = new THREE.MeshStandardMaterial({ color: ac, roughness: 0.5, metalness: 0.3 });
        const collar = new THREE.Mesh(collarGeo, collarMat);
        collar.position.y = 1.05;
        group.add(collar);

        // Head
        const headGeo = new THREE.SphereGeometry(0.24, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a870, roughness: 0.7 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.42;
        group.add(head);

        // Hat brim
        const hatBrimGeo = new THREE.CylinderGeometry(0.36, 0.36, 0.04, 16);
        const hatMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(c).multiplyScalar(0.6), roughness: 0.95 });
        const hatBrim = new THREE.Mesh(hatBrimGeo, hatMat);
        hatBrim.position.y = 1.62;
        group.add(hatBrim);

        // Hat top
        const hatTopGeo = new THREE.CylinderGeometry(0.22, 0.26, 0.28, 12);
        const hatTop = new THREE.Mesh(hatTopGeo, hatMat);
        hatTop.position.y = 1.78;
        group.add(hatTop);

        // Eyes
        [-0.09, 0.09].forEach(xOff => {
          const eyeGeo = new THREE.SphereGeometry(0.028, 8, 8);
          const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0 });
          const eye = new THREE.Mesh(eyeGeo, eyeMat);
          eye.position.set(xOff, 1.44, 0.21);
          group.add(eye);
        });

        // Accent stripe
        const stripeGeo = new THREE.CylinderGeometry(0.285, 0.285, 0.04, 12);
        const stripeMat = new THREE.MeshStandardMaterial({ color: ac, roughness: 0.4, metalness: 0.4, emissive: new THREE.Color(ac), emissiveIntensity: 0.15 });
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.position.y = 0.75;
        group.add(stripe);

        return group;
      }

      STORY.suspects.forEach(s => {
        const wrap = document.getElementById('canvas-wrap-' + s.id);
        const canvas = document.createElement('canvas');
        canvas.width = 180;
        canvas.height = 240;
        wrap.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(90, 120);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.9;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(32, 90 / 120, 0.1, 50);
        camera.position.set(0, 1.3, 4.2);
        camera.lookAt(0, 1.0, 0);

        scene.add(new THREE.AmbientLight(0x15120a, 0.7));
        const key = new THREE.PointLight(0xffe8c0, 1.2, 12);
        key.position.set(1, 4, 3);
        scene.add(key);
        const rim = new THREE.PointLight(parseInt(s.accentColor.replace('#', ''), 16), 0.4, 8);
        rim.position.set(-2, 2, -1);
        scene.add(rim);

        const char = makeCharacter(s.accentColor);
        scene.add(char);

        charScenes.push({
          id: s.id,
          renderer, scene, camera, char,
          bobble: 0, bobbleTarget: 0,
          phase: Math.random() * Math.PI * 2,
        });
      });

      // Animation loop
      function animateChars() {
        requestAnimationFrame(animateChars);
        const t = performance.now() * 0.001;
        charScenes.forEach(cs => {
          // Idle sway
          const idle = Math.sin(t * 1.2 + cs.phase) * 0.02;
          // Bobble spring
          cs.bobble += (cs.bobbleTarget - cs.bobble) * 0.08;
          if (Math.abs(cs.bobble) < 0.001 && cs.bobbleTarget === 0) cs.bobble = 0;

          cs.char.position.y = idle + cs.bobble;
          cs.char.rotation.y = Math.sin(t * 0.8 + cs.phase) * 0.06 + (cs.bobble * 2);

          cs.renderer.render(cs.scene, cs.camera);
        });
      }
      animateChars();
    }

    /* ── SELECTION ── */
    let selectedId = null;
    let gameOver = false;

    function selectSuspect(id) {
      if (gameOver) return;
      selectedId = id;

      document.querySelectorAll('.suspect-cell').forEach(c => c.classList.remove('selected'));
      document.getElementById('cell-' + id).classList.add('selected');

      // Trigger bobble on selected character
      charScenes.forEach(cs => {
        if (cs.id === id) {
          cs.bobbleTarget = 0.15;
          setTimeout(() => { cs.bobbleTarget = 0; }, 300);
        }
      });

      document.getElementById('submit-btn').classList.add('ready');
      document.getElementById('submit-hint').textContent = 'You selected: ' + STORY.suspects.find(s => s.id === id).name;
    }

    /* ── SUBMIT: Step 1 — open reasoning modal ── */
    function submitAnswer() {
      if (!selectedId || gameOver) return;

      const suspect = STORY.suspects.find(s => s.id === selectedId);
      document.getElementById('reasoning-suspect-name').textContent =
        'Accusing: ' + suspect.name + ' — ' + suspect.role;
      document.getElementById('reasoning-input').value = '';
      document.getElementById('reasoning-modal').classList.add('show');
      document.getElementById('reasoning-input').focus();
    }

    function closeReasoning() {
      document.getElementById('reasoning-modal').classList.remove('show');
    }

    /* ── SUBMIT: Step 2 — send reasoning to LLM ── */
    async function submitReasoning() {
      const reasoning = document.getElementById('reasoning-input').value.trim();
      if (reasoning.length < 15) {
        document.getElementById('reasoning-input').style.borderColor = 'var(--red-light)';
        setTimeout(() => document.getElementById('reasoning-input').style.borderColor = '', 1500);
        return;
      }

      gameOver = true;
      const btn = document.getElementById('reasoning-submit-btn');
      btn.disabled = true;
      document.getElementById('reasoning-spinner').classList.add('show');

      const lyingSuspect = STORY.suspects.find(s => s.isLying);
      const pickedCorrectSuspect = selectedId === lyingSuspect.id;

      // Build the LLM prompt
      const selectedSuspect = STORY.suspects.find(s => s.id === selectedId);
      const systemPrompt = `You are a judge for a detective puzzle game called ALIBI.

The scenario: ${STORY.situation}

The suspect statements:
${STORY.suspects.map(s => `- ${s.name} (${s.role}): "${s.easyStatement}"`).join('\n')}

The actual liar is: ${lyingSuspect.name}
Their false statement: "${lyingSuspect.easyStatement}"
Why it is false: ${lyingSuspect.lieExplanation || 'Their alibi contains a logical contradiction that makes it impossible.'}

The player accused: ${selectedSuspect.name}
The player's reasoning: "${reasoning}"

Evaluate whether:
1. The player picked the correct suspect (${pickedCorrectSuspect ? 'YES, they did' : 'NO, they picked the wrong person'})
2. Their reasoning is logically sound and identifies the right contradiction

Respond in this exact JSON format only, no markdown:
{"correct": true/false, "feedback": "2-3 sentence assessment of their detective work"}

Set "correct" to true ONLY if BOTH the suspect is right AND the reasoning identifies a valid contradiction. Otherwise set it to false.`;

      let llmResult = null;

      try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (localStorage.getItem('groq_api_key') || '')
          },
          body: JSON.stringify({
            model: 'llama-3.1-8b-instant',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: reasoning }
            ],
            stream: false
          })
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`Groq error ${response.status}: ${errText}`);
        }
        const data = await response.json();
        const text = data.choices[0].message.content;
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          llmResult = JSON.parse(jsonMatch[0]);
        }
      } catch (err) {
        console.log('LLM unavailable, using fallback:', err);
      }

      // Fallback if LLM is not connected
      if (!llmResult) {
        llmResult = {
          correct: pickedCorrectSuspect,
          feedback: pickedCorrectSuspect
            ? 'You correctly identified the liar. The contradiction in their alibi was the key piece of evidence.'
            : 'Unfortunately, you accused the wrong suspect. Re-read the alibis — one contains a physical impossibility.'
        };
      }

      document.getElementById('reasoning-spinner').classList.remove('show');
      document.getElementById('reasoning-modal').classList.remove('show');
      btn.disabled = false;

      // Reveal cells
      STORY.suspects.forEach(s => {
        const cell = document.getElementById('cell-' + s.id);
        const badge = document.getElementById('badge-' + s.id);
        if (s.isLying) {
          cell.classList.remove('selected');
          cell.classList.add('correct');
          badge.textContent = 'The Lie';
        } else if (s.id === selectedId && !pickedCorrectSuspect) {
          cell.classList.remove('selected');
          cell.classList.add('wrong');
          badge.textContent = 'Innocent';
        }
      });

      setTimeout(() => showResult(llmResult.correct, lyingSuspect, llmResult.feedback, reasoning), 500);
    }

    function showResult(correct, lyingSuspect, llmFeedback, playerReasoning) {
      const overlay = document.getElementById('result-overlay');
      const box = document.getElementById('result-box');
      const icon = document.getElementById('result-icon');
      const title = document.getElementById('result-title');
      const subtitle = document.getElementById('result-subtitle');
      const lieText = document.getElementById('result-lie-text');
      const lieExplanation = document.getElementById('result-lie-explanation');
      const llmFeedbackEl = document.getElementById('result-llm-feedback');

      box.className = 'result-box ' + (correct ? 'correct' : 'wrong');
      icon.textContent = correct ? '✓' : '✗';
      title.textContent = correct ? 'Case Cracked' : 'Not Quite';
      subtitle.textContent = correct
        ? 'You identified the liar AND explained why. Brilliant detective work.'
        : 'Your reasoning needs work. A good detective must explain the evidence.';
      
      if (correct) fireConfetti();

      llmFeedbackEl.innerHTML = formatDialogue(llmFeedback || '');
      lieText.innerHTML = '"' + formatDialogue(lyingSuspect.easyStatement) + '"';
      lieExplanation.innerHTML = `<strong>${lyingSuspect.name} · ${lyingSuspect.role}</strong>${lyingSuspect.lieExplanation ? '<br><br>' + formatDialogue(lyingSuspect.lieExplanation) : ''}`;

      overlay.classList.add('show');
    }

    function tryAgain() {
      gameOver = false;
      selectedId = null;
      document.getElementById('result-overlay').classList.remove('show');
      document.querySelectorAll('.suspect-cell').forEach(c => {
        c.classList.remove('selected', 'correct', 'wrong');
      });
      document.querySelectorAll('.cell-result-badge').forEach(b => b.textContent = '');
      document.getElementById('submit-btn').classList.remove('ready');
      document.getElementById('submit-hint').textContent = 'Select the false statement above';
    }

    /* ═══════════════════════════════════════════
       CONFETTI EFFECT
    ═══════════════════════════════════════════ */
    function fireConfetti() {
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.inset = '0';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '9999';
        document.body.appendChild(canvas);
        
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const colors = ['#c9a84c', '#e8c97a', '#c0392b', '#8b1a1a', '#e8dfc8'];
        const particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * -canvas.height - 50,
                w: Math.random() * 5 + 3,
                h: Math.random() * 10 + 5,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 2 + 2,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.15,
                swayOffset: Math.random() * Math.PI * 2
            });
        }

        let frame;
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.x += Math.sin(p.y * 0.015 + p.swayOffset) * 0.8 + p.vx;
                p.y += p.vy;
                p.rot += p.rotSpeed;
                if (p.y < canvas.height + 20) active = true;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.85;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, Math.abs(Math.cos(p.rot)) * p.h + 2);
                ctx.restore();
            });
            if (active) frame = requestAnimationFrame(render);
            else canvas.remove();
        }
        render();
    }
  </script>
</body>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALIBI — Investigation</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Special+Elite&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --black: #090909;
            --deep: #0d0c0a;
            --card: #13120f;
            --border: #252218;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: #5a4a1e;
            --red: #8b1a1a;
            --red-light: #c0392b;
            --cream: #e2d9c4;
            --muted: #6a6050;
            --fog: rgba(201, 168, 76, 0.07);
            --blue-light: #4a9aba;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--black);
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        /* ══ HUD LAYER ══ */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 20;
            font-family: 'Special Elite', monospace;
        }

        /* ── TOP BAR ── */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            background: linear-gradient(to bottom, rgba(9, 9, 9, 0.95), transparent);
            pointer-events: all;
        }

        .case-label {
            font-size: .6rem;
            letter-spacing: .3em;
            text-transform: uppercase;
            color: var(--gold);
        }

        .case-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--cream);
            margin-top: 2px;
        }

        .hud-center {
            text-align: center;
        }

        .situation-tag {
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .situation-text {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: .88rem;
            color: var(--cream);
            margin-top: 2px;
            max-width: 420px;
        }

        .hud-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .hud-btn {
            font-family: 'Special Elite', monospace;
            font-size: .62rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 16px;
            cursor: pointer;
            transition: all .2s;
            pointer-events: all;
        }

        .hud-btn:hover {
            color: var(--gold);
            border-color: var(--gold-dim);
        }

        .hud-btn.conclude {
            border-color: var(--red);
            color: var(--red-light);
        }

        .hud-btn.conclude:hover {
            background: var(--red);
            color: var(--cream);
        }

        /* ── NAME TAGS (float above characters) ── */
        .name-tag {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            transition: opacity .3s;
        }

        .name-tag .nt-name {
            font-family: 'Playfair Display', serif;
            font-size: .9rem;
            font-weight: 700;
            color: var(--cream);
            text-shadow: 0 0 12px rgba(0, 0, 0, 0.9), 0 2px 4px rgba(0, 0, 0, 1);
        }

        .name-tag .nt-role {
            font-family: 'Special Elite', monospace;
            font-size: .55rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 2px;
        }

        .name-tag .nt-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            margin: 6px auto 0;
            box-shadow: 0 0 8px var(--gold);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .4;
                transform: scale(1);
            }

            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .name-tag.talked .nt-indicator {
            background: #4aaa6a;
            box-shadow: 0 0 8px #4aaa6a;
        }

        .name-tag.active-suspect .nt-name {
            color: var(--gold);
        }

        /* ── CLICK HINT ── */
        #click-hint {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Special Elite', monospace;
            font-size: .65rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: center;
            animation: hintFloat 3s ease-in-out infinite;
            transition: opacity .5s;
        }

        @keyframes hintFloat {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-6px);
            }
        }

        /* ── VIGNETTE ── */
        #vignette {
            position: fixed;
            inset: 0;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 60%, transparent 25%, rgba(0, 0, 0, 0.75) 100%);
        }

        #noise {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
            opacity: .03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* ══ DIALOGUE PANEL ══ */
        #dialogue-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            height: 320px;
            background: linear-gradient(to top, rgba(9, 9, 9, 0.98) 80%, transparent);
            padding: 0 0 0;
            transform: translateY(100%);
            transition: transform .4s cubic-bezier(.22, 1, .36, 1);
            display: flex;
            flex-direction: column;
        }

        #dialogue-panel.open {
            transform: translateY(0);
        }

        .dp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px 10px;
            border-top: 1px solid var(--border);
        }

        .dp-suspect-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            font-style: italic;
            color: var(--cream);
        }

        .dp-suspect-role {
            font-family: 'Special Elite', monospace;
            font-size: .58rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-left: 12px;
        }

        .dp-close {
            font-family: 'Special Elite', monospace;
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color .2s;
            padding: 4px 8px;
        }

        .dp-close:hover {
            color: var(--gold);
        }

        .dp-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0 32px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }

        .dp-messages::-webkit-scrollbar {
            width: 3px;
        }

        .dp-messages::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 72%;
            animation: msgIn .25s ease both;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.player {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg.suspect {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-bubble {
            padding: 9px 15px;
            font-family: 'Crimson Text', serif;
            font-size: .95rem;
            line-height: 1.5;
        }

        .msg.suspect .msg-bubble {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--cream);
            border-radius: 0 8px 8px 8px;
        }

        .msg.player .msg-bubble {
            background: var(--gold-dim);
            border: 1px solid var(--gold-dim);
            color: var(--cream);
            border-radius: 8px 0 8px 8px;
        }

        .msg-label {
            font-family: 'Special Elite', monospace;
            font-size: .52rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .typing-dots span {
            display: inline-block;
            width: 5px;
            height: 5px;
            background: var(--muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: dot 1.2s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes dot {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-6px);
            }
        }

        .thinking-label {
            font-family: 'Special Elite', monospace;
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 6px;
            animation: thinkPulse 1.6s ease-in-out infinite;
        }

        @keyframes thinkPulse {
            0%, 100% { opacity: .4; }
            50%       { opacity: 1; }
        }

        .dp-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 32px 20px;
            border-top: 1px solid var(--border);
        }

        #chat-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--cream);
            font-family: 'Crimson Text', serif;
            font-size: .95rem;
            padding: 10px 16px;
            outline: none;
            resize: none;
            height: 42px;
            transition: border-color .2s;
        }

        #chat-input:focus {
            border-color: var(--gold-dim);
        }

        #chat-input::placeholder {
            color: var(--muted);
        }

        #send-btn {
            font-family: 'Special Elite', monospace;
            font-size: .65rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            background: var(--gold);
            color: var(--black);
            border: none;
            cursor: pointer;
            padding: 11px 22px;
            transition: all .2s;
            white-space: nowrap;
        }

        #send-btn:hover {
            background: var(--gold-light);
        }

        #send-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ══ DIARY PANEL ══ */
        #diary-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            z-index: 40;
            width: 360px;
            background: var(--deep);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform .4s cubic-bezier(.22, 1, .36, 1);
            display: flex;
            flex-direction: column;
        }

        #diary-panel.open {
            transform: translateX(0);
        }

        .diary-header {
            padding: 22px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .diary-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            font-style: italic;
            color: var(--gold);
        }

        .diary-close {
            font-family: 'Special Elite', monospace;
            font-size: .6rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color .2s;
        }

        .diary-close:hover {
            color: var(--cream);
        }

        .diary-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            scrollbar-width: thin;
            scrollbar-color: var(--gold-dim) transparent;
        }

        .diary-body::-webkit-scrollbar {
            width: 3px;
        }

        .diary-body::-webkit-scrollbar-thumb {
            background: var(--gold-dim);
        }

        .diary-suspect-block {
            margin-bottom: 28px;
        }

        .diary-suspect-name {
            font-family: 'Special Elite', monospace;
            font-size: .65rem;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .diary-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--gold);
            flex-shrink: 0;
        }

        .diary-entry {
            margin-bottom: 8px;
        }

        .diary-q {
            font-family: 'Crimson Text', serif;
            font-size: .82rem;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 2px;
        }

        .diary-a {
            font-family: 'Crimson Text', serif;
            font-size: .88rem;
            color: var(--cream);
            line-height: 1.5;
        }

        .diary-empty {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: .88rem;
            color: var(--muted);
            text-align: center;
            margin-top: 60px;
            line-height: 1.8;
        }

        /* ══ CONCLUDE MODAL ══ */
        #conclude-modal {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(9, 9, 9, .92);
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        #conclude-modal.open {
            display: flex;
        }

        .conclude-box {
            background: var(--card);
            border: 1px solid var(--border);
            width: 560px;
            max-width: 94vw;
            padding: 36px 40px;
            position: relative;
        }

        .conclude-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--red-light), transparent);
        }

        .conclude-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--cream);
            margin-bottom: 6px;
        }

        .conclude-sub {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: .9rem;
            color: var(--muted);
            margin-bottom: 28px;
        }

        .conclude-field {
            margin-bottom: 20px;
        }

        .conclude-label {
            font-family: 'Special Elite', monospace;
            font-size: .62rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 8px;
            display: block;
        }

        .conclude-select,
        .conclude-textarea {
            width: 100%;
            background: var(--deep);
            border: 1px solid var(--border);
            color: var(--cream);
            font-family: 'Crimson Text', serif;
            font-size: .95rem;
            padding: 10px 14px;
            outline: none;
            transition: border-color .2s;
        }

        .conclude-select:focus,
        .conclude-textarea:focus {
            border-color: var(--gold-dim);
        }

        .conclude-textarea {
            resize: vertical;
            min-height: 90px;
            line-height: 1.5;
        }

        .conclude-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-conclude-submit {
            font-family: 'Special Elite', monospace;
            font-size: .7rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            background: var(--red-light);
            color: var(--cream);
            border: none;
            cursor: pointer;
            padding: 13px 30px;
            flex: 1;
            transition: all .2s;
        }

        .btn-conclude-submit:hover {
            background: #d44;
            transform: translateY(-1px);
        }

        .btn-cancel {
            font-family: 'Special Elite', monospace;
            font-size: .65rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            cursor: pointer;
            padding: 13px 20px;
            transition: all .2s;
        }

        .btn-cancel:hover {
            color: var(--cream);
            border-color: var(--muted);
        }

        /* ══ RESULT MODAL ══ */
        #result-modal {
            position: fixed;
            inset: 0;
            z-index: 60;
            background: rgba(9, 9, 9, .95);
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn .3s ease;
        }
        #result-modal.open { display: flex; }
        .result-box {
            background: var(--card);
            border: 1px solid var(--border);
            width: 500px;
            max-width: 90vw;
            padding: 40px;
            text-align: center;
            position: relative;
        }
        .result-box.correct { border-top: 3px solid var(--gold); }
        .result-box.wrong { border-top: 3px solid var(--red-light); }
        .result-icon { font-size: 3rem; margin-bottom: 10px; }
        .result-box.correct .result-icon { color: var(--gold); }
        .result-box.wrong .result-icon { color: var(--red-light); }
        .result-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--cream);
            margin-bottom: 20px;
        }
        .result-feedback {
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            color: var(--cream);
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            padding: 15px;
            background: var(--deep);
            border: 1px solid var(--border);
        }

        /* ══ TOAST ══ */
        #toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--card);
            border: 1px solid var(--gold-dim);
            font-family: 'Special Elite', monospace;
            font-size: .65rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--gold);
            padding: 10px 22px;
            z-index: 60;
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <!-- ATMOSPHERE -->
    <div id="vignette"></div>
    <div id="noise"></div>

    <!-- THREE.JS CANVAS -->
    <canvas id="c"></canvas>

    <!-- ══ HUD ══ -->
    <div id="hud">
        <!-- TOP BAR -->
        <div id="top-bar">
            <div>
                <div class="case-label" id="hud-case-label">Case · N-001</div>
                <div class="case-title" id="hud-case-title">Loading…</div>
            </div>
            <div class="hud-center">
                <div class="situation-tag">The Situation</div>
                <div class="situation-text" id="hud-situation">—</div>
            </div>
            <div class="hud-actions">
                <button class="hud-btn" onclick="toggleDiary()">📓 Diary</button>
                <button class="hud-btn conclude" onclick="openConclude()">Conclude →</button>
            </div>
        </div>

        <!-- NAME TAGS (positioned by JS) -->
        <div id="name-tags"></div>

        <!-- CLICK HINT -->
        <div id="click-hint">Click a suspect to interrogate</div>
    </div>

    <!-- ══ DIALOGUE PANEL ══ -->
    <div id="dialogue-panel">
        <div class="dp-header">
            <div style="display:flex;align-items:baseline;gap:0">
                <span class="dp-suspect-name" id="dp-name">Margaret Holt</span>
                <span class="dp-suspect-role" id="dp-role">Housekeeper</span>
            </div>
            <button class="dp-close" onclick="closeDialogue()">✕ Close</button>
        </div>
        <div class="dp-messages" id="dp-messages"></div>
        <div class="dp-input-row">
            <input id="chat-input" type="text" placeholder="Ask something…" autocomplete="off"
                onkeydown="if(event.key==='Enter')sendMessage()" />
            <button id="send-btn" onclick="sendMessage()">Send →</button>
        </div>
    </div>

    <!-- ══ DIARY PANEL ══ -->
    <div id="diary-panel">
        <div class="diary-header">
            <div class="diary-title">Detective's Diary</div>
            <button class="diary-close" onclick="toggleDiary()">Close ✕</button>
        </div>
        <div class="diary-body" id="diary-body">
            <div class="diary-empty">No notes yet.<br><br>Interrogate suspects to<br>fill this diary.</div>
        </div>
    </div>

    <!-- ══ CONCLUDE MODAL ══ -->
    <div id="conclude-modal">
        <div class="conclude-box">
            <div class="conclude-title">Your Verdict</div>
            <div class="conclude-sub">Name the culprit — and more importantly, explain why they did it.</div>
            <div class="conclude-field">
                <label class="conclude-label">The culprit is…</label>
                <select class="conclude-select" id="culprit-select">
                    <option value="">— Select a suspect —</option>
                </select>
            </div>
            <div class="conclude-field">
                <label class="conclude-label">Their motive…</label>
                <textarea class="conclude-textarea" id="motive-input"
                    placeholder="Explain why this person committed the crime. Be specific — what drove them to it?"></textarea>
            </div>
            <div class="conclude-actions">
                <button class="btn-cancel" onclick="closeConclude()">← Go Back</button>
                <button class="btn-conclude-submit" onclick="submitVerdict()">Submit Verdict</button>
            </div>
        </div>
    </div>

    <!-- ══ RESULT MODAL ══ -->
    <div id="result-modal">
        <div class="result-box" id="result-box-el">
            <div class="result-icon" id="result-icon-el">✓</div>
            <div class="result-title" id="result-title-el">Case Closed</div>
            <div class="result-feedback" id="result-feedback-el">...</div>
            <button class="btn-conclude-submit" style="margin-top:20px; width:100%" onclick="closeResult()">Close</button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" id="toast"></div>

    <!-- THREE.JS -->
    <script src="/stories.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        /* ═══════════════════════════════════════════
           GAME STATE
        ═══════════════════════════════════════════ */

        // Read which story and mode was selected
        const params = new URLSearchParams(window.location.search);
        const STORY_ID = params.get('story') || 'dead-in-december';
        const GAME_MODE = params.get('mode') || 'normal';

        // Load story from stories.js
        const STORY = getNormalStory(STORY_ID);
        if (!STORY) {
            document.body.innerHTML = '<div style="color:#c9a84c;font-family:serif;text-align:center;padding:20vh">Story not found: ' + STORY_ID + '</div>';
            throw new Error('Story not found: ' + STORY_ID);
        }

        // Populate HUD
        document.getElementById('hud-case-label').textContent = 'Case · ' + STORY.caseNumber;
        document.getElementById('hud-case-title').textContent = STORY.title;
        document.getElementById('hud-situation').textContent = STORY.situation;

        // Populate culprit dropdown from story suspects
        const culpritSel = document.getElementById('culprit-select');
        STORY.suspects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name + ' — ' + s.role;
            culpritSel.appendChild(opt);
        });

        // Build SUSPECTS array from story data, add runtime fields
        const SUSPECTS = STORY.suspects.map(s => ({
            ...s,
            color: s.color || 0x3a3028,
            accentColor: typeof s.accentColor === 'string'
                ? parseInt(s.accentColor.replace('#', ''), 16)
                : (s.accentColor || 0xc9a84c),
            talked: false,
        }));

        const diary = {};
        SUSPECTS.forEach(s => diary[s.id] = []);
        let activeSuspect = null;
        let conversationHistory = {};
        SUSPECTS.forEach(s => conversationHistory[s.id] = []);

        /* ═══════════════════════════════════════════
           THREE.JS SCENE
        ═══════════════════════════════════════════ */
        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.85;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x09090a, 0.055);

        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
        camera.position.set(0, 2.2, 9.5);
        camera.lookAt(0, 1.5, 0);

        function resize() {
            const w = window.innerWidth, h = window.innerHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);

        /* ── FLOOR ── */
        const floorGeo = new THREE.PlaneGeometry(22, 22, 30, 30);
        const floorMat = new THREE.MeshStandardMaterial({
            color: 0x0a0906, roughness: 0.92, metalness: 0.08
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        /* ── FLOOR GRID (subtle) ── */
        const gridHelper = new THREE.GridHelper(20, 20, 0x1a1810, 0x111008);
        gridHelper.position.y = 0.001;
        scene.add(gridHelper);

        /* ── BACK WALL ── */
        const wallGeo = new THREE.PlaneGeometry(22, 10);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x0b0a08, roughness: 1 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 5, -5);
        wall.receiveShadow = true;
        scene.add(wall);

        /* ── AMBIENT ── */
        const ambientLight = new THREE.AmbientLight(0x15120a, 0.6);
        scene.add(ambientLight);

        /* ── CEILING LAMP (center) ── */
        const lampLight = new THREE.PointLight(0xffe8c0, 1.4, 18);
        lampLight.position.set(0, 6, 1);
        lampLight.castShadow = true;
        lampLight.shadow.mapSize.width = 1024;
        lampLight.shadow.mapSize.height = 1024;
        scene.add(lampLight);

        // Lamp geometry
        const lampGeo = new THREE.CylinderGeometry(0.15, 0.3, 0.25, 8);
        const lampMat = new THREE.MeshStandardMaterial({ color: 0x2a2010, roughness: 0.8 });
        const lampMesh = new THREE.Mesh(lampGeo, lampMat);
        lampMesh.position.set(0, 6.2, 1);
        scene.add(lampMesh);

        /* ── BUILD STYLIZED CHARACTER ── */
        function makeCharacter(suspect) {
            const group = new THREE.Group();
            const c = suspect.color;
            const ac = suspect.accentColor;

            // Body
            const bodyGeo = new THREE.CylinderGeometry(0.28, 0.32, 1.1, 12);
            const bodyMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, metalness: 0.05 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.55;
            body.castShadow = true;
            group.add(body);

            // Collar accent
            const collarGeo = new THREE.CylinderGeometry(0.29, 0.29, 0.06, 12);
            const collarMat = new THREE.MeshStandardMaterial({ color: ac, roughness: 0.5, metalness: 0.3 });
            const collar = new THREE.Mesh(collarGeo, collarMat);
            collar.position.y = 1.05;
            group.add(collar);

            // Head
            const headGeo = new THREE.SphereGeometry(0.24, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xd4a870, roughness: 0.7, metalness: 0 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.42;
            head.castShadow = true;
            group.add(head);

            // Hat brim
            const hatBrimGeo = new THREE.CylinderGeometry(0.36, 0.36, 0.04, 16);
            const hatMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(c).multiplyScalar(0.6), roughness: 0.95 });
            const hatBrim = new THREE.Mesh(hatBrimGeo, hatMat);
            hatBrim.position.y = 1.62;
            group.add(hatBrim);

            // Hat top
            const hatTopGeo = new THREE.CylinderGeometry(0.22, 0.26, 0.28, 12);
            const hatTop = new THREE.Mesh(hatTopGeo, hatMat);
            hatTop.position.y = 1.78;
            group.add(hatTop);

            // Eyes (two small spheres)
            [-0.09, 0.09].forEach(xOff => {
                const eyeGeo = new THREE.SphereGeometry(0.028, 8, 8);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0 });
                const eye = new THREE.Mesh(eyeGeo, eyeMat);
                eye.position.set(xOff, 1.44, 0.21);
                group.add(eye);
            });

            // Accent stripe on body
            const stripeGeo = new THREE.CylinderGeometry(0.285, 0.285, 0.04, 12);
            const stripeMat = new THREE.MeshStandardMaterial({ color: ac, roughness: 0.4, metalness: 0.4, emissive: new THREE.Color(ac), emissiveIntensity: 0.15 });
            const stripe = new THREE.Mesh(stripeGeo, stripeMat);
            stripe.position.y = 0.75;
            group.add(stripe);

            // Shadow spot on floor
            const shadowGeo = new THREE.CircleGeometry(0.38, 16);
            const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
            const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
            shadowMesh.rotation.x = -Math.PI / 2;
            shadowMesh.position.y = 0.002;
            group.add(shadowMesh);

            // Character spot light
            const spot = new THREE.SpotLight(new THREE.Color(ac), 0.9, 8, Math.PI / 6, 0.6);
            spot.position.set(0, 5, 0);
            spot.target = group;
            spot.castShadow = false;
            group.add(spot);
            group.add(spot.target);

            group.userData = { suspectId: suspect.id, idleY: 0, phase: Math.random() * Math.PI * 2, spot };
            return group;
        }

        /* ── PLACE CHARACTERS ── */
        const positions = [-4.2, -1.4, 1.4, 4.2];
        const characterMeshes = [];

        SUSPECTS.forEach((s, i) => {
            const ch = makeCharacter(s);
            ch.position.set(positions[i], 0, 0);
            scene.add(ch);
            characterMeshes.push(ch);
        });

        /* ── RAYCASTING (hover + click) ── */
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredChar = null;

        function getCharacterUnder(event) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(characterMeshes, true);
            if (!hits.length) return null;
            let obj = hits[0].object;
            while (obj.parent && !obj.userData.suspectId) obj = obj.parent;
            return obj.userData.suspectId ? obj : null;
        }

        canvas.addEventListener('mousemove', e => {
            const ch = getCharacterUnder(e);
            if (ch !== hoveredChar) {
                if (hoveredChar) hoveredChar.userData.hovered = false;
                hoveredChar = ch;
                if (hoveredChar) { hoveredChar.userData.hovered = true; canvas.style.cursor = 'pointer'; }
                else canvas.style.cursor = 'crosshair';
            }
        });

        canvas.addEventListener('click', e => {
            const ch = getCharacterUnder(e);
            if (ch) openDialogue(ch.userData.suspectId);
        });

        /* ── NAME TAGS ── */
        const tagContainer = document.getElementById('name-tags');
        const tagEls = {};

        SUSPECTS.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'name-tag';
            div.id = 'tag-' + s.id;
            div.innerHTML = `
    <div class="nt-name">${s.name}</div>
    <div class="nt-role">${s.role}</div>
    <div class="nt-indicator"></div>`;
            tagContainer.appendChild(div);
            tagEls[s.id] = div;
        });

        function updateNameTags() {
            SUSPECTS.forEach((s, i) => {
                const ch = characterMeshes[i];
                const pos = new THREE.Vector3();
                ch.getWorldPosition(pos);
                pos.y += 2.15;
                pos.project(camera);
                const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
                const el = tagEls[s.id];
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                if (s.talked) el.classList.add('talked');
                if (activeSuspect === s.id) el.classList.add('active-suspect');
                else el.classList.remove('active-suspect');
            });
        }

        /* ── ANIMATE ── */
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Idle bob + hover scale
            characterMeshes.forEach((ch, i) => {
                const base = ch.userData.phase;
                const hovered = ch.userData.hovered;
                const isActive = activeSuspect === SUSPECTS[i].id;

                // Idle breath bob
                ch.position.y = Math.sin(t * 0.9 + base) * 0.03;

                // Hover lift
                const targetY = (hovered || isActive) ? 0.12 : 0;
                ch.position.y += targetY * 0.6;

                // Scale
                const targetScale = hovered ? 1.06 : 1;
                ch.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);

                // Talking wobble
                if (isActive && isSuspectTyping) {
                    ch.rotation.y = Math.sin(t * 8) * 0.04;
                } else {
                    ch.rotation.y += (-ch.rotation.y) * 0.08;
                }

                // Spot light brightness
                const targetInt = (hovered || isActive) ? 1.8 : 0.5;
                ch.userData.spot.intensity += (targetInt - ch.userData.spot.intensity) * 0.08;
            });

            // Lamp flicker
            lampLight.intensity = 1.4 + Math.sin(t * 0.3) * 0.03 + (Math.random() - 0.5) * 0.02;

            updateNameTags();
            renderer.render(scene, camera);
        }
        animate();

        /* ═══════════════════════════════════════════
           DIALOGUE SYSTEM
        ═══════════════════════════════════════════ */
        let isSuspectTyping = false;

        function openDialogue(suspectId) {
            activeSuspect = suspectId;
            const s = SUSPECTS.find(x => x.id === suspectId);
            document.getElementById('dp-name').textContent = s.name;
            document.getElementById('dp-role').textContent = '— ' + s.role;
            document.getElementById('dialogue-panel').classList.add('open');
            document.getElementById('click-hint').style.opacity = '0';

            // Render existing messages
            renderMessages(suspectId);

            // Opening line if first time
            if (!s.talked && conversationHistory[suspectId].length === 0) {
                setTimeout(() => addSuspectMessage(suspectId, getOpeningLine(s)), 500);
            }

            document.getElementById('chat-input').focus();
        }

        function getOpeningLine(s) {
            return s.openingLine || "I have nothing to say to you.";
        }

        function closeDialogue() {
            document.getElementById('dialogue-panel').classList.remove('open');
            activeSuspect = null;
        }

        function renderMessages(suspectId) {
            const container = document.getElementById('dp-messages');
            container.innerHTML = '';
            conversationHistory[suspectId].forEach(m => appendBubble(m.role, m.content));
        }

        function appendBubble(role, text) {
            const container = document.getElementById('dp-messages');
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'player' : 'suspect');
            div.innerHTML = `<div class="msg-label">${role === 'user' ? 'You' : (SUSPECTS.find(s => s.id === activeSuspect) || { name: '' }).name}</div><div class="msg-bubble">${formatDialogue(text)}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTypingIndicator() {
            const container = document.getElementById('dp-messages');
            const div = document.createElement('div');
            div.className = 'msg suspect'; div.id = 'typing-indicator';
            div.innerHTML = `<div class="thinking-label">Thinking…</div><div class="msg-bubble typing-dots"><span></span><span></span><span></span></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        // Save reply to state + diary (no DOM append — used by streaming path)
        function addSuspectMessageToState(suspectId, text) {
            const s = SUSPECTS.find(x => x.id === suspectId);
            if (!s.talked) { s.talked = true; }
            conversationHistory[suspectId].push({ role: 'assistant', content: text });
            const lastQ = conversationHistory[suspectId].filter(m => m.role === 'user').slice(-1)[0];
            if (lastQ) {
                diary[suspectId].push({ q: lastQ.content, a: text });
                renderDiary();
            }
        }

        // Save to state + diary + append DOM bubble (used by error path)
        function addSuspectMessage(suspectId, text) {
            addSuspectMessageToState(suspectId, text);
            appendBubble('assistant', text);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !activeSuspect || isSuspectTyping) return;

            input.value = '';
            document.getElementById('send-btn').disabled = true;
            isSuspectTyping = true;
            document.getElementById('click-hint').style.opacity = '0';

            conversationHistory[activeSuspect].push({ role: 'user', content: text });
            appendBubble('user', text);
            showTypingIndicator();

            const s = SUSPECTS.find(x => x.id === activeSuspect);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + (localStorage.getItem('groq_api_key') || '')
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'system', content: s.systemPrompt },
                            { role: 'user', content: 'I am the detective. Tell me your initial statement.' },
                            ...conversationHistory[activeSuspect]
                        ],
                        stream: true
                    })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Groq error: ${response.status} ${errText}`);
                }

                // Read SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = '';
                let buffer = '';
                let bubbleEl = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (let line of lines) {
                        line = line.trim();
                        if (!line || line === 'data: [DONE]') continue;
                        if (line.startsWith('data: ')) {
                            try {
                                const chunk = JSON.parse(line.substring(6));
                                const deltaContent = chunk.choices[0]?.delta?.content;
                                if (deltaContent) {
                                    accumulated += deltaContent;

                                    if (!bubbleEl) {
                                        removeTypingIndicator();
                                        const container = document.getElementById('dp-messages');
                                        const bubbleDiv = document.createElement('div');
                                        bubbleDiv.className = 'msg suspect';
                                        bubbleDiv.innerHTML = `<div class="msg-label">${s.name}</div><div class="msg-bubble" id="streaming-bubble"></div>`;
                                        container.appendChild(bubbleDiv);
                                        bubbleEl = document.getElementById('streaming-bubble');
                                    }

                                    const container = document.getElementById('dp-messages');
                                    bubbleEl.innerHTML = formatDialogue(accumulated);
                                    container.scrollTop = container.scrollHeight;
                                }
                            } catch { /* ignore */ }
                        }
                    }
                }

                if (bubbleEl) {
                    bubbleEl.removeAttribute('id');
                } else {
                    removeTypingIndicator(); // in case no tokens yielded
                }

                // Save to history and diary
                addSuspectMessageToState(activeSuspect, accumulated);

            } catch (err) {
                removeTypingIndicator();
                console.error('LLM error:', err);
                addSuspectMessage(activeSuspect, `[LLM error: ${err.message}]`);
            }

            isSuspectTyping = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        /* ═══════════════════════════════════════════
           DIARY
        ═══════════════════════════════════════════ */
        let diaryOpen = false;

        function toggleDiary() {
            diaryOpen = !diaryOpen;
            document.getElementById('diary-panel').classList.toggle('open', diaryOpen);
            renderDiary();
        }

        function renderDiary() {
            const body = document.getElementById('diary-body');
            const hasAny = SUSPECTS.some(s => diary[s.id].length > 0);

            if (!hasAny) {
                body.innerHTML = '<div class="diary-empty">No notes yet.<br><br>Interrogate suspects to<br>fill this diary.</div>';
                return;
            }

            body.innerHTML = '';
            SUSPECTS.forEach(s => {
                if (!diary[s.id].length) return;
                const block = document.createElement('div');
                block.className = 'diary-suspect-block';
                block.innerHTML = `<div class="diary-suspect-name"><span class="diary-dot"></span>${s.name}</div>`;
                diary[s.id].forEach(entry => {
                    const e = document.createElement('div');
                    e.className = 'diary-entry';
                    e.innerHTML = `<div class="diary-q">Q: ${entry.q}</div><div class="diary-a">${entry.a}</div>`;
                    block.appendChild(e);
                });
                body.appendChild(block);
            });
        }

        /* ═══════════════════════════════════════════
           CONCLUDE
        ═══════════════════════════════════════════ */
        function openConclude() {
            const talkedCount = SUSPECTS.filter(s => s.talked).length;
            if (talkedCount < 2) {
                showToast('Talk to at least 2 suspects first');
                return;
            }
            document.getElementById('conclude-modal').classList.add('open');
        }

        function closeConclude() {
            document.getElementById('conclude-modal').classList.remove('open');
        }

        async function submitVerdict() {
            const culprit = document.getElementById('culprit-select').value;
            const motive = document.getElementById('motive-input').value.trim();
            if (!culprit) { showToast('Select a suspect'); return; }
            if (motive.length < 20) { showToast('Explain the motive in more detail'); return; }

            const submitBtn = document.querySelector('#conclude-modal .btn-conclude-submit');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Evaluating...';

            const correctSuspect = culprit === STORY.culprit;
            const culpritSuspect = STORY.suspects.find(s => s.id === STORY.culprit);
            const culpritName = culpritSuspect ? culpritSuspect.name : STORY.culprit;
            const accusedSuspect = STORY.suspects.find(s => s.id === culprit);
            const accusedName = accusedSuspect ? accusedSuspect.name : culprit;

            const systemPrompt = `You are the lead detective grading a junior officer in ALIBI.

The Case: ${STORY.title}
The Situation: ${STORY.situation}

The actual killer is: ${culpritName}
Their true motive: "${STORY.trueMotive}"

The player accused: ${accusedName}
The player's explanation for the motive: "${motive}"

Evaluate whether:
1. The player picked the correct killer (${correctSuspect ? 'YES, they did' : 'NO, they picked the wrong person'})
2. The player's explanation addresses the core truth of the motive, even if worded slightly differently. Reject gibberish or completely wrong motives.

Respond in this exact JSON format only, no markdown:
{"correct": true/false, "feedback": "2-3 sentence assessment of their deduction."}

Set "correct" to true ONLY if BOTH the suspect is correct AND their motive explanation broadly captures the true motive.`;

            let llmResult = null;
            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + (localStorage.getItem('groq_api_key') || '')
                    },
                    body: JSON.stringify({
                        model: 'llama-3.1-8b-instant',
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: motive }
                        ],
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Groq error ${response.status}: ${errText}`);
                }
                const data = await response.json();
                const text = data.choices[0].message.content;
                const jsonMatch = text.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    llmResult = JSON.parse(jsonMatch[0]);
                }
            } catch (err) {
                console.error('Verdict LLM error:', err);
            }

            if (!llmResult) {
                llmResult = {
                    correct: correctSuspect && motive.length > 25,
                    feedback: correctSuspect ? 'You got the killer right, but the AI grader is offline.' : 'You accused the wrong person.'
                };
            }

            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            closeConclude();

            const rModal = document.getElementById('result-modal');
            const rBox = document.getElementById('result-box-el');
            const rIcon = document.getElementById('result-icon-el');
            const rTitle = document.getElementById('result-title-el');
            const rFeedback = document.getElementById('result-feedback-el');

            rBox.className = 'result-box ' + (llmResult.correct ? 'correct' : 'wrong');
            rIcon.textContent = llmResult.correct ? '✓' : '✗';
            rTitle.textContent = llmResult.correct ? 'Case Closed' : 'Not Quite';
            rFeedback.innerHTML = formatDialogue(llmResult.feedback);
            
            rModal.classList.add('open');

            if (llmResult.correct) {
                setTimeout(fireConfetti, 100);
            }
        }

        function closeResult() {
            document.getElementById('result-modal').classList.remove('open');
        }

        /* ═══════════════════════════════════════════
           CONFETTI EFFECT
        ═══════════════════════════════════════════ */
        function fireConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.inset = '0';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const colors = ['#c9a84c', '#e8c97a', '#c0392b', '#8b1a1a', '#e8dfc8'];
            const particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height - 50,
                    w: Math.random() * 5 + 3,
                    h: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2 + 2,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.15,
                    swayOffset: Math.random() * Math.PI * 2
                });
            }

            let frame;
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                particles.forEach(p => {
                    p.x += Math.sin(p.y * 0.015 + p.swayOffset) * 0.8 + p.vx;
                    p.y += p.vy;
                    p.rot += p.rotSpeed;
                    if (p.y < canvas.height + 20) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = 0.85;
                    ctx.fillRect(-p.w/2, -p.h/2, p.w, Math.abs(Math.cos(p.rot)) * p.h + 2);
                    ctx.restore();
                });
                if (active) frame = requestAnimationFrame(render);
                else canvas.remove();
            }
            render();
        }

        /* ═══════════════════════════════════════════
           TOAST
        ═══════════════════════════════════════════ */
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
        }
    </script>
